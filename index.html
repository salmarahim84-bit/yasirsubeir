<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasir Subeir - Digital Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
            margin: 20px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .titles {
            font-size: 14px;
            color: #666;
            margin: 10px 0 25px 0;
            line-height: 1.5;
            padding: 0 15px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .link-btn {
            text-decoration: none;
            color: #333;
            background-color: #f8f9fa;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 400;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background-color: #e9ecef;
        }

        .add-contact-btn {
            display: inline-block;
            background-color: #2c3e50; /* Sleek Slate Gray */
            color: #ffffff;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .add-contact-btn:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="profile.jpg" alt="Yasir Subeir" class="profile-img">
        
        <h1>Yasir Subeir</h1>
        <div class="titles">Ministerial Advisor | C-Level Executive <br> Giga Programs Leadership</div>

        <div class="links">
            <a href="tel:+97433399022" class="link-btn">📞 Voice: +974 333 99022</a>
            <a href="https://wa.me/17034707187" class="link-btn">💬 WhatsApp: +1 703 470 7187</a>
            <a href="https://www.linkedin.com/in/yasirsubeir" class="link-btn" target="_blank">🔗 LinkedIn Profile</a>
        </div>

        <a href="contact.vcf" class="add-contact-btn">Add to Contacts</a>
        
        <div id="android-helper" style="display: none; font-size: 13px; color: #888; margin-top: 15px;">
            Android users: Tap <strong>Open</strong> after downloading to save contact.
        </div>
    </div>
    <script>
        // Check if the user is on an Android device
        if (/android/i.test(navigator.userAgent)) {
            // This is the 'Android Intent' that talks directly to the Contacts app
            var androidIntent = "intent:#Intent;action=android.intent.action.INSERT;type=vnd.android.cursor.dir/contact;S.name=Yasir%20Subeir;S.phone=+97433399022;S.secondary_phone=+17034707187;S.job_title=Ministerial%20Advisor;S.browser_fallback_url=https://yasir-subeir.github.io/contact.vcf;end;";
            
            // Swap the button link from the VCF file to the instant Intent
            document.querySelector('.add-contact-btn').href = androidIntent;
            
            // Hide the helper text we added earlier, since it will now open instantly!
            var helperText = document.getElementById('android-helper');
            if (helperText) {
                helperText.style.display = 'none';
            }
        }
     </script>
</body>
</html>
